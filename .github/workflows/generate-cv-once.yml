name: Generate updated CV once

on:
  push:
    branches:
      - codex/update-cv-july-2026
    paths:
      - .github/scripts/generate-cv.mjs
      - .github/workflows/generate-cv-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/update-cv-july-2026
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate CV PDF
        run: node .github/scripts/generate-cv.mjs

      - name: Verify generated PDF
        run: |
          python - <<'PY'
          from pathlib import Path
          target = Path('assets/pdfs/Jaime Ramsden de Frutos CV.pdf')
          data = target.read_bytes()
          if not data.startswith(b'%PDF-'):
              raise SystemExit('Generated file is not a PDF')
          if data.count(b'/Type /Page') < 2 and data.count(b'/Type/Page') < 2:
              raise SystemExit('Generated CV does not appear to contain two pages')
          print(f'Validated {target} ({len(data)} bytes)')
          PY

      - name: Commit only the CV replacement
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- 'assets/pdfs/Jaime Ramsden de Frutos CV.pdf'
          if git diff --cached --quiet; then
            echo 'CV already up to date.'
            exit 0
          fi
          git commit -m 'Replace CV with updated cybersecurity analyst version'
          git push origin HEAD:codex/update-cv-july-2026
