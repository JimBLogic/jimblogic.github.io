name: Update live training evidence

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-training-evidence.yml

permissions:
  contents: write

jobs:
  update-training-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Replace stale platform image with live evidence
        shell: python
        run: |
          from pathlib import Path

          script_path = Path("assets/js/script.js")
          script = script_path.read_text(encoding="utf-8")

          old_provider = """    {
              key: 'TryHackMe · HackTheBox',
              name: 'TryHackMe · HackTheBox',
              imgLocal: './assets/Images/Profilepicandother/tryhackmehackthebox.jpg',
              link: 'https://github.com/JimBLogic/TryHackme-HackTheBox',
              manualCount: true
            }
          ];"""

          new_provider = """    {
              key: 'TryHackMe',
              name: 'TryHackMe · Live profile',
              imgWeb: 'https://tryhackme-badges.s3.amazonaws.com/JimBLogic.png',
              link: 'https://tryhackme.com/p/JimBLogic',
              manualCount: true,
              wideBadge: true
            },
            {
              key: 'Hack The Box Academy',
              name: 'HTB Academy · Academician',
              imgWeb: 'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/hackthebox.svg',
              link: 'https://academy.hackthebox.com/achievement/badge/0c6246a5-e11c-11ee-b18d-bea50ffe6cb4',
              manualCount: true
            },
            {
              key: 'Hack The Box Academy',
              name: 'HTB Academy · Our Favorite Seabird',
              imgWeb: 'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/hackthebox.svg',
              link: 'https://academy.hackthebox.com/achievement/badge/2f425309-f326-11ee-b18d-bea50ffe6cb4',
              manualCount: true
            }
          ];"""

          if old_provider not in script:
              raise SystemExit("Expected TryHackMe/HTB provider block was not found")
          script = script.replace(old_provider, new_provider, 1)

          old_render = """    const count = p.manualCount ? '' : (countBy[p.key] || 0);
              const img = imgLocalThenOnline(p.imgLocal || '', p.imgWeb || '', p.name);
              return `
                <div class=\"journey-card\" data-href=\"${p.link}\">
                  <div class=\"journey-thumb\">${img}</div>"""

          new_render = """    const count = p.manualCount ? '' : (countBy[p.key] || 0);
              const img = imgLocalThenOnline(p.imgLocal || '', p.imgWeb || '', p.name);
              const cardClass = p.wideBadge ? ' journey-card-profile' : '';
              const thumbClass = p.wideBadge ? 'journey-thumb journey-thumb-profile' : 'journey-thumb';
              return `
                <div class=\"journey-card${cardClass}\" data-href=\"${p.link}\">
                  <div class=\"${thumbClass}\">${img}</div>"""

          if old_render not in script:
              raise SystemExit("Expected journey-card render block was not found")
          script = script.replace(old_render, new_render, 1)
          script_path.write_text(script, encoding="utf-8")

          css_path = Path("assets/css/training-profiles.css")
          css_path.write_text("""/* Live TryHackMe and verified HTB Academy evidence */
          .journey-card-profile {
            align-items: center;
          }

          .journey-card-profile .journey-thumb-profile {
            width: 190px;
            min-width: 190px;
            height: 74px;
            padding: 4px;
          }

          .journey-card-profile .journey-thumb-profile img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
          }

          @media (max-width: 700px) {
            .journey-card-profile {
              align-items: flex-start;
            }

            .journey-card-profile .journey-thumb-profile {
              width: 100%;
              max-width: 330px;
              min-width: 0;
              height: auto;
            }

            .journey-card-profile .journey-thumb-profile img {
              height: auto;
            }
          }
          """, encoding="utf-8")

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          css_anchor = '  <link rel="stylesheet" href="./assets/css/cyberdailylog.css?v=%VITE_BUILD_VERSION%">\n'
          css_link = '  <link rel="stylesheet" href="./assets/css/training-profiles.css?v=%VITE_BUILD_VERSION%">\n'
          if css_link not in index:
              if css_anchor not in index:
                  raise SystemExit("Expected stylesheet anchor was not found")
              index = index.replace(css_anchor, css_anchor + css_link, 1)
          index_path.write_text(index, encoding="utf-8")

          old_image = Path("assets/Images/Profilepicandother/tryhackmehackthebox.jpg")
          if old_image.exists():
              old_image.unlink()

          Path(".github/workflows/update-training-evidence.yml").unlink()

      - name: Commit updated portfolio evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/script.js assets/css/training-profiles.css index.html assets/Images/Profilepicandother/tryhackmehackthebox.jpg .github/workflows/update-training-evidence.yml
          git diff --cached --check
          git commit -m "Add live TryHackMe and verified HTB evidence"
          git push
