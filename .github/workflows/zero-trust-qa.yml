name: Zero-trust QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zero-trust-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Lint, build, validate and browser QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.x
      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.x
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax check JavaScript and scripts
        run: |
          node --check assets/js/script.js
          node --check assets/js/translate.js
          node --check scripts/validate-local.mjs
          node --check scripts/audit-production.mjs
      - name: Lint source
        run: npm run lint
      - name: Build committed distribution
        run: npm run build
      - name: Validate local build once
        run: npm run validate:local
      - name: Enforce committed dist parity
        run: git diff --exit-code -- . ':!package-lock.json'
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Chromium browser QA
        run: npm run test:e2e:chromium
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.x
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 10
          if-no-files-found: ignore
