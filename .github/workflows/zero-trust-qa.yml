name: Zero Trust Portfolio QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  build-static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node --check assets/js/script.js
      - run: node --check assets/js/translate.js
      - run: npm run validate:local
      - run: git diff --check
      - name: Verify no binary diff entries
        run: |
          if git diff --numstat | awk '$1 == "-" && $2 == "-" { found=1 } END { exit found }'; then
            echo "No binary diff entries"
          else
            echo "Binary diff entry detected" >&2
            exit 1
          fi
      - name: Upload built dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  browser-qa:
    runs-on: ubuntu-latest
    needs: build-static-validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

  production-audit:
    runs-on: ubuntu-latest
    needs: build-static-validation
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run audit:production
      - name: Upload production audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-audit
          path: audit-artifacts
